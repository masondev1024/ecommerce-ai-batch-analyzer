# Local dev stack: Airflow (LocalExecutor) + MySQL + FastAPI.
# DAG edits: scheduler picks up file changes quickly; UI refresh shows updates.
# Optional: AIRFLOW_IMAGE_NAME, AIRFLOW_PROJ_DIR (default: this directory).

x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:2.9.3}
  environment: &airflow-common-env
    # Dashboard / logs: Korea time (same idea as Airflow 2.x sample compose)
    TZ: Asia/Seoul
    AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE: Asia/Seoul
    LANG: C.UTF-8
    LC_ALL: C.UTF-8
    PYTHONUTF8: "1"
    PYTHONIOENCODING: "utf-8"
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    # Same value on webserver + scheduler or log UI returns 403 on served logs (8793).
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY:-local-dev-airflow-secret-key-change-in-production-min-32-chars}
    # Encrypt Connection/Variable secrets in metadata DB; set AIRFLOW__FERNET_KEY in .env to override
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__FERNET_KEY:-LEa7hsYuBg3wtLV5HIE6SxhsRfeFH6bqj1JNMpQLWqY=}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    # session = normal UI login/cookies; basic = API tools
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
    # Pick up DAG file changes quickly (refresh in UI shows new/updated DAGs without long wait)
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: "10"
    AIRFLOW__CORE__MIN_FILE_PROCESS_INTERVAL: "10"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    _PIP_ADDITIONAL_REQUIREMENTS: apache-airflow-providers-mysql pymysql requests
    # Airflow runs inside a container: localhost:8000 is WRONG here (points to Airflow itself, not FastAPI).
    REVIEW_API_BASE_URL: ${REVIEW_API_BASE_URL:-http://ai-api-server:8000}
    REVIEW_API_CONNECT_TIMEOUT: ${REVIEW_API_CONNECT_TIMEOUT:-15}
    REVIEW_API_READ_TIMEOUT: ${REVIEW_API_READ_TIMEOUT:-300}
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy
    mysql:
      condition: service_healthy
    ai-api-server:
      condition: service_started

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mysql:
    image: mysql:8.0
    command:
      - --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: my_datawarehouse
      MYSQL_USER: airflow
      MYSQL_PASSWORD: airflow
    ports:
      - "3306:3306" # 로컬 3307 쓰셨다면 다시 3306으로 맞추는 게 덜 헷갈립니다.
    healthcheck:
      # 초기화 시 root 계정으로 정확히 찔러야 합니다.
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  ai-api-server:
    build: ./api_server
    container_name: ai-api-server
    environment:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_CLI_TIMEOUT: ${GEMINI_CLI_TIMEOUT:-300}
    ports:
      - "8000:8000"
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    user: "0:0"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs /opt/airflow/config /opt/airflow/plugins
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/logs /opt/airflow/config /opt/airflow/plugins 2>/dev/null || true
        airflow db migrate && \
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  mysql_data:
